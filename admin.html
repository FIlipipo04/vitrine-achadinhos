<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress Mode - Atelier (Admin)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-container">
    <div style="grid-column: 1 / -1;">
        <div class="header-nav">
            <h1>Atelier Control</h1>
            <a href="index.html" target="_blank" class="btn-view">Ver Vitrine ↗</a>
        </div>
    </div>

    <!-- 1. GERENCIAR CATEGORIAS (O NOVO PAINEL!) -->
    <div class="panel">
        <h2>Gerenciar Categorias</h2>
        <div class="form-group" style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="catNome" placeholder="Ex: Moda Praia">
            <button class="btn-main" onclick="window.addCategory()" style="width: 120px;">Adicionar</button>
        </div>
        <ul class="product-list" id="categoryList">
            <li style="text-align: center; color: #666; padding: 10px;">Carregando...</li>
        </ul>
    </div>

    <!-- 2. FORMULÁRIO DE PRODUTO -->
    <div class="panel">
        <h2 id="formTitle">Nova Peça</h2>
        
        <div class="form-group">
            <label>Nome da Peça</label>
            <input type="text" id="pNome" placeholder="Ex: Vestido Maison Rouge">
        </div>

        <div class="form-group">
            <label>ID (Código TikTok)</label>
            <input type="text" id="pId" placeholder="Ex: LOOK01">
        </div>
        
        <div class="form-group">
            <label>Categoria (Vem do banco de dados agora)</label>
            <select id="pCat">
                <!-- As opções vão aparecer aqui sozinhas -->
            </select>
        </div>

        <div class="form-group">
            <label>Link da Foto (ImgBB, Pinterest, Shein)</label>
            <input type="text" id="pImagesUrls" placeholder="https://...">
            <small>Dica: Para colocar mais de uma foto (carrossel), separe os links por vírgula.</small>
        </div>

        <div class="form-group">
            <label>Link de Afiliado Final</label>
            <input type="text" id="pLink" placeholder="https://...">
        </div>
        
        <button id="submitBtn" class="btn-main" onclick="window.saveProduct()">Publicar no Site</button>
        <button id="cancelBtn" class="btn-cancel" onclick="window.cancelEdit()" style="display: none;">Cancelar Edição</button>
    </div>

    <!-- 3. LISTA DE PRODUTOS -->
    <div class="panel" style="grid-column: 1 / -1;">
        <h2>Inventário</h2>
        <ul class="product-list" id="adminList">
            <li style="text-align: center; color: #666; padding: 20px;">Carregando...</li>
        </ul>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script type="module" src="js/admin.js"></script>
</body>
</html>
