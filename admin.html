<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress Mode - Atelier (Admin)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-container">
    <div style="grid-column: 1 / -1;">
        <div class="header-nav">
            <h1>Atelier Control</h1>
            <a href="index.html" target="_blank" class="btn-view">Ver Vitrine ↗</a>
        </div>
    </div>

    <!-- Formulário com UPLOAD REAL -->
    <div class="panel">
        <h2 id="formTitle">Nova Peça</h2>
        
        <div class="form-group">
            <label>Nome da Peça</label>
            <input type="text" id="pNome" placeholder="Ex: Vestido Maison Rouge">
        </div>

        <div class="form-group">
            <label>ID (Código TikTok)</label>
            <input type="text" id="pId" placeholder="Ex: LOOK01">
        </div>
        
        <div class="form-group">
            <label>Categoria</label>
            <select id="pCat">
                <option value="Dresses">Dresses (Vestidos)</option>
                <option value="Tops">Tops (Blusas)</option>
                <option value="Bottoms">Bottoms (Calças/Saias)</option>
                <option value="Accessories">Accessories (Acessórios)</option>
            </select>
        </div>

        <!-- UPLOAD DE ARQUIVO AQUI -->
        <div class="form-group">
            <label>Fotos (Envie direto do PC/Celular)</label>
            <input type="file" id="pImagesFiles" multiple accept="image/*" class="file-input">
            <small>Você pode selecionar várias fotos segurando Ctrl (PC) ou selecionando várias no celular.</small>
            <!-- Guardamos as URLs antigas se for edição -->
            <input type="hidden" id="pImagesUrlsOld">
        </div>

        <div class="form-group">
            <label>Link de Afiliado Final</label>
            <input type="text" id="pLink" placeholder="https://...">
        </div>
        
        <button id="submitBtn" class="btn-main" onclick="window.saveProduct()">Publicar no Site</button>
        <button id="cancelBtn" class="btn-cancel" onclick="window.cancelEdit()" style="display: none;">Cancelar Edição</button>
    </div>

    <!-- Lista -->
    <div class="panel">
        <h2>Inventário</h2>
        <ul class="product-list" id="adminList">
            <li style="text-align: center; color: #666; padding: 20px;">Carregando...</li>
        </ul>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script type="module" src="js/admin.js"></script>
</body>
</html>
