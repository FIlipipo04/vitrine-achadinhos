<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achadinhos - Vitrine VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- DESIGN DE LUXO (ZARA & SHEIN PREMIUM) --- */
        :root { 
            --bg-color: #1a0204; /* Vinho ultra escuro (quase preto) para contraste */
            --surface: #2b0306; /* Vinho intermediário para os cartões */
            --gold: #dcb37b; 
            --gold-dark: #a87d46; 
            --text-light: #ffffff; 
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(43, 3, 6, 0.7); 
            --border-glow: rgba(220, 179, 123, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--gold); 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container simulando App */
        .container { 
            width: 100%; 
            max-width: 450px; 
            min-height: 100vh;
            background-color: var(--bg-color);
            display: flex; 
            flex-direction: column; 
            position: relative;
        }

        /* Header Fixo Premium (Glassmorphism) */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 99;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glow);
            padding: 15px 20px 20px 20px;
        }
        
        .header { text-align: center; margin-bottom: 15px; }
        .header h2 { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; font-size: 1.1rem; color: var(--gold); letter-spacing: 2px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 4px; text-transform: uppercase; color: var(--text-light); text-shadow: 0 4px 15px rgba(0,0,0,0.6); margin-top: -5px; }
        
        /* Busca Estilizada */
        .search-container { position: relative; }
        .search-input { 
            width: 100%; 
            padding: 14px 20px 14px 48px; 
            border: 1px solid rgba(220, 179, 123, 0.3); 
            border-radius: 50px; 
            background-color: rgba(0, 0, 0, 0.3); 
            color: var(--text-light); 
            font-size: 0.95rem; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .search-input::placeholder { color: rgba(220, 179, 123, 0.4); }
        .search-input:focus { 
            border-color: var(--gold); 
            box-shadow: 0 0 15px rgba(220, 179, 123, 0.2);
            background-color: rgba(0, 0, 0, 0.5);
        }
        .search-icon { 
            position: absolute; 
            left: 18px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--gold); 
            display: flex;
            align-items: center;
        }

        /* Filtros horizontais deslizantes */
        .categories { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding: 15px 20px; 
            scrollbar-width: none; 
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { 
            padding: 10px 20px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(220, 179, 123, 0.15); 
            color: var(--text-muted); 
            border-radius: 30px; 
            font-size: 0.8rem; 
            font-weight: 500; 
            letter-spacing: 0.5px;
            white-space: nowrap; 
            cursor: pointer; 
            transition: all 0.3s ease; 
        }
        .cat-btn.active { 
            background: linear-gradient(135deg, var(--gold-dark), var(--gold)); 
            color: #1a0204; 
            font-weight: 600;
            border-color: transparent;
            box-shadow: 0 4px 10px rgba(220, 179, 123, 0.2);
        }

        /* Área do Feed */
        .feed { display: flex; flex-direction: column; gap: 30px; padding: 10px 20px 50px 20px; }
        
        /* Card Premium */
        .product-card { 
            display: flex; 
            flex-direction: column; 
            background: var(--surface); 
            border-radius: 20px; 
            padding: 12px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.3s ease;
        }
        
        /* Carrossel com dots */
        .carousel-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
        }
        .carousel-container { 
            width: 100%; 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scrollbar-width: none; 
        }
        .carousel-container::-webkit-scrollbar { display: none; }
        .carousel-item { min-width: 100%; scroll-snap-align: center; position: relative; }
        .carousel-item img { width: 100%; height: 420px; object-fit: cover; display: block; }
        
        /* Indicadores de bolinha (Dots) */
        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 5;
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .dot {
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .dot.active {
            background: var(--gold);
            width: 12px;
            border-radius: 30px;
        }

        .cat-badge { 
            position: absolute; 
            top: 12px; 
            right: 12px; 
            background: rgba(26, 2, 4, 0.8); 
            color: var(--gold); 
            padding: 6px 12px; 
            border-radius: 30px; 
            font-size: 0.65rem; 
            font-weight: 600; 
            letter-spacing: 1px;
            text-transform: uppercase;
            backdrop-filter: blur(5px); 
            border: 1px solid rgba(220, 179, 123, 0.2);
        }
        
        /* Rodapé do Card */
        .product-info { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 15px; 
            padding: 0 5px; 
        }
        .product-id { 
            font-weight: 500; 
            font-size: 1.1rem; 
            color: var(--text-light); 
            letter-spacing: 1.5px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .copy-btn { 
            background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(220,179,123,0.15); 
            color: var(--gold); 
            cursor: pointer; 
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .copy-btn:active { background: rgba(220, 179, 123, 0.2); transform: scale(0.9); }
        
        .btn-buy { 
            width: 100%; 
            margin-top: 14px; 
            padding: 15px; 
            background: linear-gradient(135deg, var(--gold-dark), var(--gold)); 
            color: #1a0204; 
            text-decoration: none; 
            border-radius: 14px; 
            font-weight: 600; 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 2px; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 15px rgba(168, 125, 70, 0.2); 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-buy:active { transform: scale(0.98); box-shadow: none; }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, #2b0306 25%, #380408 50%, #2b0306 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; }
        .skel-img { width: 100%; height: 420px; border-radius: 16px; }
        .skel-text { width: 40%; height: 20px; margin-top: 15px; border-radius: 10px; }
        .skel-btn { width: 100%; height: 50px; margin-top: 15px; border-radius: 14px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Toasts Modernos */
        .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 1000; width: 80%; max-width: 300px; }
        .toast { 
            background: rgba(220, 179, 123, 0.95); 
            color: #1a0204; 
            padding: 12px 20px; 
            border-radius: 30px; 
            font-weight: 600; 
            font-size: 0.85rem; 
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            opacity: 0; 
            transform: translateY(20px); 
            animation: slideUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; 
            backdrop-filter: blur(10px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        .empty-msg { text-align: center; color: var(--gold-dark); font-style: italic; margin-top: 60px; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="header">
            <h2>achadinhos</h2>
            <h1>VIP</h1>
        </div>

        <div class="search-container">
            <span class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
            <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar código do TikTok (Ex: 3G85)...">
        </div>
    </div>

    <div class="categories" id="categoryFilters">
        <button class="cat-btn active" onclick="filterByCategory('Tudo', this)">Tudo</button>
        <button class="cat-btn" onclick="filterByCategory('Roupas', this)">Roupas</button>
        <button class="cat-btn" onclick="filterByCategory('Sapatos', this)">Sapatos</button>
        <button class="cat-btn" onclick="filterByCategory('Acessórios', this)">Acessórios</button>
        <button class="cat-btn" onclick="filterByCategory('Casa', this)">Casa</button>
    </div>

    <div class="feed" id="feedContainer">
        <div class="product-card">
            <div class="skeleton skel-img"></div>
            <div style="width: 100%; display: flex; justify-content: space-between;"><div class="skeleton skel-text"></div></div>
            <div class="skeleton skel-btn"></div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB0sfEpbNf7t6ZkYX_TFPLgNA559D5pssM",
        authDomain: "conta-ttk.firebaseapp.com",
        projectId: "conta-ttk",
        storageBucket: "conta-ttk.firebasestorage.app",
        messagingSenderId: "418211942552",
        appId: "1:418211942552:web:99b86646d1f1195d7180ed",
        measurementId: "G-M45YMVGF10"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const q = query(collection(db, "produtos"), orderBy("dataCriacao", "desc"));

    let allProducts = [];
    let currentCategory = 'Tudo';
    let currentSearch = '';

    onSnapshot(q, (snapshot) => {
        allProducts = [];
        snapshot.forEach((doc) => {
            allProducts.push({ ...doc.data(), uid: doc.id });
        });
        applyFilters();
    });

    document.getElementById('searchInput').addEventListener('keyup', (e) => {
        currentSearch = e.target.value.toUpperCase();
        applyFilters();
    });

    window.filterByCategory = (cat, btnElement) => {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        applyFilters();
    };

    function applyFilters() {
        let filtered = allProducts;
        if(currentCategory !== 'Tudo') {
            filtered = filtered.filter(p => p.categoria === currentCategory);
        }
        if(currentSearch !== '') {
            filtered = filtered.filter(p => p.id.toUpperCase().includes(currentSearch));
        }
        renderFeed(filtered);
    }

    window.copyToClipboard = (text) => {
        navigator.clipboard.writeText(text).then(() => {
            showToast(`Código ${text} copiado!`);
        });
    };

    function showToast(message) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'none'; // Reseta animação para remover suavemente
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 2200);
    }

    // Gerenciador de carrossel (Dots)
    window.updateDots = (carouselElement, cardUid) => {
        const scrollPosition = carouselElement.scrollLeft;
        const width = carouselElement.offsetWidth;
        const index = Math.round(scrollPosition / width);
        const dots = document.querySelectorAll(`.dot-group-${cardUid} .dot`);
        dots.forEach((dot, idx) => {
            if(idx === index) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    };

    function renderFeed(productsToRender) {
        const feed = document.getElementById('feedContainer');
        feed.innerHTML = '';

        if (productsToRender.length === 0) {
            feed.innerHTML = '<p class="empty-msg">Nenhum produto cadastrado com esse código.</p>';
            return;
        }

        productsToRender.forEach(product => {
            const images = product.images.split(',').map(img => img.trim());
            const cat = product.categoria || 'Moda';
            const cardUid = product.uid;
            
            let carouselHTML = '';
            let dotsHTML = '';
            
            images.forEach((img, idx) => {
                carouselHTML += `
                    <div class="carousel-item">
                        <img src="${img}" alt="ID ${product.id}" loading="lazy">
                        <span class="cat-badge">${cat}</span>
                    </div>`;
                dotsHTML += `<div class="dot ${idx === 0 ? 'active' : ''}"></div>`;
            });

            const card = `
                <div class="product-card">
                    <div class="carousel-wrapper">
                        <div class="carousel-container" onscroll="updateDots(this, '${cardUid}')">
                            ${carouselHTML}
                        </div>
                        ${images.length > 1 ? `<div class="carousel-dots dot-group-${cardUid}">${dotsHTML}</div>` : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-id">
                            ID: ${product.id.toUpperCase()}
                            <button class="copy-btn" onclick="copyToClipboard('${product.id.toUpperCase()}')" title="Copiar código">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </div>
                    <a href="${product.link}" target="_blank" class="btn-buy">
                        <span>Ir para Loja</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                </div>
            `;
            feed.innerHTML += card;
        });
    }
</script>
</body>
</html>
