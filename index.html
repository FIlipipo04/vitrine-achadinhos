<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress Mode - A Coleção</title>
    <!-- Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/client.css">
</head>
<body>

<div class="app-container">
    <!-- Cabeçalho Melhorado e em PT-BR -->
    <div class="glass-header">
        <div class="brand-title">
            <h2>SELEÇÃO EXCLUSIVA</h2>
            <h1>Dress Mode</h1>
        </div>

        <div class="categories" id="categoryFilters">
            <button class="cat-btn active" onclick="filterByCategory('Tudo', this)">Tudo</button>
            <!-- As outras categorias serão inseridas aqui magicamente pelo Banco de Dados -->
        </div>
        
        <div class="categories" id="categoryFilters">
            <button class="cat-btn active" onclick="filterByCategory('Tudo', this)">Tudo</button>
            <button class="cat-btn" onclick="filterByCategory('Vestidos', this)">Vestidos</button>
            <button class="cat-btn" onclick="filterByCategory('Blusas', this)">Blusas</button>
            <button class="cat-btn" onclick="filterByCategory('Parte de Baixo', this)">Parte de Baixo</button>
            <button class="cat-btn" onclick="filterByCategory('Acessórios', this)">Acessórios</button>
        </div>
    </div>

    <!-- Feed principal -->
    <div class="feed" id="feedContainer">
        <!-- Esqueleto de Carregamento -->
        <div class="glass-card skeleton-card">
            <div class="skeleton skel-img"></div>
            <div class="skeleton skel-title"></div>
            <div class="skeleton skel-btn"></div>
        </div>
    </div>

    <!-- Rodapé Premium (O segredo da seriedade) -->
    <footer class="premium-footer">
        <div class="footer-content">
            <div class="footer-col">
                <h3>Dress Mode</h3>
                <p>Curadoria de moda especializada. Elevando o seu estilo com peças exclusivas.</p>
            </div>
            <div class="footer-col">
                <h4>Atendimento</h4>
                <a href="sobre.html">Nossa História</a>
                <a href="contato.html">Fale Conosco</a>
            </div>
            <div class="footer-col">
                <h4>Políticas</h4>
                <a href="trocas.html">Trocas e Devoluções</a>
                <a href="termos.html">Termos de Uso</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Dress Mode. Todos os direitos reservados.</p>
        </div>
    </footer>
</div>

<div class="toast-container" id="toastContainer"></div>
<script type="module" src="js/client.js"></script>
</body>
</html>
