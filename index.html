<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress Mode - A Coleção</title>
    <!-- Fontes Editoriais -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/client.css">
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="header">
            <h2>CURATED EDIT</h2>
            <h1>DRESS MODE</h1>
        </div>

        <div class="search-container">
            <span class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar por #ID...">
        </div>
    </div>

    <!-- Filtros Editoriais -->
    <div class="categories" id="categoryFilters">
        <button class="cat-btn active" onclick="filterByCategory('Tudo', this)">All</button>
        <button class="cat-btn" onclick="filterByCategory('Dresses', this)">Dresses</button>
        <button class="cat-btn" onclick="filterByCategory('Tops', this)">Tops</button>
        <button class="cat-btn" onclick="filterByCategory('Bottoms', this)">Bottoms</button>
        <button class="cat-btn" onclick="filterByCategory('Accessories', this)">Accessories</button>
    </div>

    <!-- Feed principal -->
    <div class="feed" id="feedContainer">
        <!-- Esqueleto de Carregamento -->
        <div class="product-card skeleton-card">
            <div class="skeleton skel-img"></div>
            <div class="skeleton skel-title"></div>
            <div class="skeleton skel-id"></div>
            <div class="skeleton skel-btn"></div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script type="module" src="js/client.js"></script>
</body>
</html>
