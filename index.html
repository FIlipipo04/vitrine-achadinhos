<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achadinhos Premium - Vitrine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/client.css">
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="header">
            <h2>ACHADINHOS</h2>
            <h1>VIP</h1>
        </div>

        <div class="search-container">
            <span class="search-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
            <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar código do TikTok...">
        </div>
    </div>

    <div class="categories" id="categoryFilters">
        <button class="cat-btn active" onclick="filterByCategory('Tudo', this)">Tudo</button>
        <button class="cat-btn" onclick="filterByCategory('Roupas', this)">Roupas</button>
        <button class="cat-btn" onclick="filterByCategory('Sapatos', this)">Sapatos</button>
        <button class="cat-btn" onclick="filterByCategory('Acessórios', this)">Acessórios</button>
        <button class="cat-btn" onclick="filterByCategory('Casa', this)">Casa</button>
    </div>

    <div class="feed" id="feedContainer">
        <div class="product-card">
            <div class="skeleton skel-img"></div>
            <div style="width: 100%; display: flex; justify-content: space-between;"><div class="skeleton skel-text"></div></div>
            <div class="skeleton skel-btn"></div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module" src="js/client.js"></script>
</body>
</html>
